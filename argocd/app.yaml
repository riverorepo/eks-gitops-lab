apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/riverorepo/eks-gitops-lab
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true