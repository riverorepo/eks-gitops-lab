name: Build and push image

on:
  push:
    branches: [main]
    paths: ['docker/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::241356815757:role/github-actions-ecr-push
          aws-region: us-east-1

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REPO: 241356815757.dkr.ecr.us-east-1.amazonaws.com/llm-app
        run: |
         docker build -t $REPO:${{ github.sha }} docker/
         docker push $REPO:${{ github.sha }}